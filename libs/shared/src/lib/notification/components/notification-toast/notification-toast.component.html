<div class="toast flex-row position-relative justify-content-space-b gap-12 br-20 p-16"
     [@toastAnimation]
     [ngStyle]="{'--mm-toast-accent': iconColor}">

  <div class="close-btn-container position-absolute">
    <mm-close-btn
        (clicked)="dismiss.emit()"
        containerClass="w-24 h-24"
        iconClass="h-16 w-16 fs-16"
        backgroundColor="var(--items-bg)"
        iconColor="var(--primary-color)"
    >
    </mm-close-btn>
  </div>

  <div class="content flex-column gap-12">
    <div class="flex-row gap-8 align-i-center heading-container">
      <mat-icon
          class="w-20 h-20 fs-20"
          [ngStyle]="{'color':iconColor}"
          [fontIcon]="icon"
      ></mat-icon>
      @if (notification.title) {
        <strong class="title">
          {{ notification.title }}
        </strong>
      }
    </div>
    <p class="message">{{ notification.message }}</p>
  </div>
  @if (notification.duration && notification.duration > 0) {
    <div
        class="progress"
        [style.animation-duration.ms]="notification.duration">
    </div>
  }
</div>

<div
    class="pill-container flex-row justify-content-center align-i-center cursor-pointer"
    [ngClass]="[class, selected ? 'selected' : '',clickable? 'cursor-pointer':'']"
    [style.--pill-bg]="backgroundColor"
    [style.--pill-text]="textColor"
    [style.--pill-active]="activeColor"
>
  <p [ngClass]="textClass">{{ text }}</p>
</div>

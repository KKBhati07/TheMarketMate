<div
  class="mm-search-wrapper position-relative"
  [class.active]="isOverlayOpen"
  [style.--mm-search-scale]="focusScale"
>
  @if (isOverlayOpen) {
    <div class="mm-search-backdrop" (mousedown)="close()"></div>
  }

  <div class="mm-search-container justify-content-space-b flex-row align-i-center {{ containerClass }}"
       [ngClass]="{'disabled': disabled, 'raised': isOverlayOpen}">

    <div class="left-section flex-row align-i-center gap-8 w-100p">
      <mat-icon class="fs-18 w-18 h-18" fontIcon="search"></mat-icon>

      <input
          class="mm-search-input border-none fs-14 w-100p h-100p br-32 pl-12"
          [formControl]="searchControl"
          type="text"
          [placeholder]="placeholder"
          [readonly]="disabled"
          (focus)="onFocus()"
          (blur)="onBlur()"
          (keydown)="onKeydown($event)"
      />
    </div>

    <div class="right-section flex-row align-i-center gap-8">
      @if (searchControl.value.length) {
        <mat-icon
            class="fs-18 w-18 h-18 cursor-pointer"
            fontIcon="close"
            aria-label="Clear search"
            (click)="onClear()"
        ></mat-icon>
      }
    </div>

    @if (isDropdownOpen) {
      <div class="suggestions-dropdown position-absolute br-20 p-8 flex-column gap-4 mt-4">
        @for (s of suggestions; track s; let i = $index) {
          <div
            class="suggestion-item br-12 p-8 cursor-pointer"
            [class.active]="i === activeIndex"
            (mouseenter)="onSuggestionMouseEnter(i)"
            (mousedown)="selectSuggestion(s)"
          >
            {{ s }}
          </div>
        }
      </div>
    }
  </div>
</div>

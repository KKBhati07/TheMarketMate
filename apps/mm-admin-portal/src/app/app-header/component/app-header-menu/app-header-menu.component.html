<div (click)="onItemClick.emit()"
     class="header-menu-outer-container
     position-absolute
     flex-row justify-content-center p-8
     w-100p h-100p">
  <div
      [ngClass]="{
      'h-320':!isAuthenticated,
      'h-268':isAuthenticated && isAdmin,
      'h-216':isAuthenticated && !isAdmin
      }"
    [@fadeInOut]
      class="header-menu-container
       br-32 flex-column gap-12
       w-100p mt-72 p-8">
    @if (!isAuthenticated) {
      <mm-nav-button
        (click)="onItemClick.emit()"
        [routerLink]="[SharedUrls.AUTH.BASE,SharedUrls.AUTH.LOGIN]"
        [class]="'pl-4 pr-4 h-40 br-20'"
        iconContainerClass="h-32 w-32"
        iconClass="h-20 w-20 fs-20"
        textClass="fw-6"
        text="Login"
        gap="5"
        [showIcon]="true"
        [headerNav]="true"
        icon="login"
      ></mm-nav-button>
    } @else {
      <div class="header-menu-user flex-row align-i-center gap-10 br-24 pl-8 pr-8 py-6 w-100p h-40">
        <div class="header-menu-user-avatar border-circle overflow-hidden flex-row align-i-center justify-content-center w-36 h-36">
          @if (profileUrl && !profileImgError) {
            <img
              (error)="profileImgError = true"
              [src]="profileUrl"
              alt=""
              class="w-100p h-100p"
              loading="lazy"
            />
          } @else {
            <mat-icon class="header-menu-user-avatar-icon fs-24 h-24 w-24" fontIcon="person"></mat-icon>
          }
        </div>
        <p class="header-menu-user-name fw-6 fs-14">{{ userName }}</p>
      </div>
      <mm-nav-button
        (click)="onItemClick.emit('LOGOUT')"
        [class]="'pl-4 pr-4 h-40 br-20'"
        iconContainerClass="h-32 w-32"
        iconClass="h-20 w-20 fs-20"
        textClass="fw-6"
        text="Logout"
        gap="5"
        [showIcon]="true"
        [headerNav]="true"
        icon="logout"
      ></mm-nav-button>
    }
    <div class="header-menu-theme flex-row align-i-center justify-content-space-b pl-8 pr-8 h-48 br-28 w-100p">
      <div class="flex-row align-i-center gap-8">
        <mat-icon fontIcon="palette" class="h-28 w-28 fs-28"></mat-icon>
        <span class="fw-6 fs-16" style="color: var(--primary-color)">{{ isLightTheme ? 'Light' : 'Dark' }}</span>
      </div>
      <mm-toggle
          [checked]="!isLightTheme"
          (toggleChange)="themeToggle.emit($event)"
          aria-label="Theme"
      ></mm-toggle>
    </div>
  </div>
</div>

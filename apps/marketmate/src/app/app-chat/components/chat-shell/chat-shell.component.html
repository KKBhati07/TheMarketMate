<div class="chat-shell flex-row pl-4 pb-4 pr-4 gap-4">
  <div class="sidebar w-380 flex-column br-28">
    <app-conversation-list
        class="h-100p"
        ngSkipHydration
        [conversations]="conversations"
        [selectedConversationId]="activeConversation"
        (selectConversation)="onSelectConversation($event)">
    </app-conversation-list>
  </div>

  <main class="chat-area flex-column position-relative br-32">
    @if (activeConversation) {
      <app-chat-window
          [conversationId]="activeConversation"
          (back)="onBack()">
      </app-chat-window>
    } @else {
      <div class="empty-state h-100p flex-column align-i-center justify-content-center p-20 position-relative">
        <div class="empty-icon">
          <svg width="134" height="134" viewBox="0 0 134 134" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M67 0C30.1 0 0 30.1 0 67C0 103.9 30.1 134 67 134C103.9 134 134 103.9 134 67C134 30.1 103.9 0 67 0ZM67 120.6C36.2 120.6 13.4 97.8 13.4 67C13.4 36.2 36.2 13.4 67 13.4C97.8 13.4 120.6 36.2 120.6 67C120.6 97.8 97.8 120.6 67 120.6Z"
                fill="#54656F"/>
            <path
                d="M67 26.8C52.3 26.8 40.2 38.9 40.2 53.6C40.2 68.3 52.3 80.4 67 80.4C81.7 80.4 93.8 68.3 93.8 53.6C93.8 38.9 81.7 26.8 67 26.8ZM67 67C60.4 67 55 61.6 55 55C55 48.4 60.4 43 67 43C73.6 43 79 48.4 79 55C79 61.6 73.6 67 67 67Z"
                fill="#54656F"/>
            <path
                d="M67 93.8C60.4 93.8 54.2 95.4 48.6 98.2C47.1 98.9 45.3 98.4 44.2 97.1C43.1 95.8 42.8 94 43.5 92.5C48.1 82.9 57.1 76.2 67 76.2C76.9 76.2 85.9 82.9 90.5 92.5C91.2 94 90.9 95.8 89.8 97.1C88.7 98.4 86.9 98.9 85.4 98.2C79.8 95.4 73.6 93.8 67 93.8Z"
                fill="#54656F"/>
          </svg>
        </div>
        <h3>Select a conversation</h3>
        <p>Start chatting with buyers or sellers</p>
      </div>
    }
  </main>

</div>
